plugins {
    id 'java'
    id 'application'
    id 'org.springframework.boot' version '3.5.14'
    id 'io.spring.dependency-management' version '1.1.7'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

ext {
    springBootVersion = '3.5.14'
    jacksonVersion = '2.21.3'
    postgresVersion = '42.7.11'
    flywayVersion = '12.6.1'
    jjwtVersion = '0.12.6'
    springSecurityTestVersion = '7.0.4'
}

application {
    mainClass = 'org.ugina.App'
}

dependencies {
    // Use TestNG framework, also requires calling test.useTestNG() below
    testImplementation libs.testng

    // This dependency is used by the application.
    implementation libs.guava
    implementation "com.fasterxml.jackson.core:jackson-databind:${jacksonVersion}"

    implementation "org.springframework.boot:spring-boot-starter-web:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-validation:${springBootVersion}"

    implementation "org.springframework.boot:spring-boot-starter-data-jpa:${springBootVersion}"
    runtimeOnly "org.postgresql:postgresql:${postgresVersion}"
    implementation "org.flywaydb:flyway-core:${flywayVersion}"
    implementation "org.flywaydb:flyway-database-postgresql:${flywayVersion}"

    implementation "org.springframework.boot:spring-boot-starter-security:${springBootVersion}"
    implementation "io.jsonwebtoken:jjwt-api:${jjwtVersion}"
    runtimeOnly "io.jsonwebtoken:jjwt-impl:${jjwtVersion}"
    runtimeOnly "io.jsonwebtoken:jjwt-jackson:${jjwtVersion}"

    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

// BCrypt для паролей — приходит с spring-security, явная не нужна

// Тесты Spring Boot
    testImplementation "org.springframework.boot:spring-boot-starter-test:${springBootVersion}"
    testImplementation "org.springframework.security:spring-security-test:${springSecurityTestVersion}"

    implementation 'com.bucket4j:bucket4j-core:8.10.1'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(23)
    }
}

application {
    mainClass = 'org.ugina.App'
}

tasks.named('test') {
    // Use TestNG for unit tests.
    useTestNG()
}

tasks.register('runServer', JavaExec) {
    group = 'application'
    description = 'Run the echo server'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.ugina.server.ChatServer'
    standardInput = System.in
}

tasks.register('runClient', JavaExec) {
    group = 'application'
    description = 'Run the echo client'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.ugina.client.ChatClient'
    standardInput = System.in
}